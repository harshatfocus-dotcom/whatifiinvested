<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Circular border -->
  <circle cx="100" cy="100" r="91" fill="white" stroke="#1a1a1a" stroke-width="5.5"/>

  <!-- ===== BEAR (left side, hunched/sitting) ===== -->
  <!-- Bear body -->
  <ellipse cx="60" cy="122" rx="22" ry="17" fill="#1a1a1a"/>
  <!-- Bear head -->
  <circle cx="44" cy="110" r="13" fill="#1a1a1a"/>
  <!-- Bear ear left -->
  <circle cx="35" cy="99" r="5.5" fill="#1a1a1a"/>
  <!-- Bear ear right -->
  <circle cx="49" cy="97" r="5.5" fill="#1a1a1a"/>
  <!-- Bear snout -->
  <ellipse cx="34" cy="113" rx="6" ry="4.5" fill="#3d3d3d"/>
  <!-- Bear eye -->
  <circle cx="40" cy="107" r="2" fill="white"/>
  <!-- Bear rump -->
  <ellipse cx="76" cy="126" rx="11" ry="9" fill="#1a1a1a"/>
  <!-- Bear front paws -->
  <ellipse cx="50" cy="135" rx="7" ry="4.5" fill="#1a1a1a"/>
  <ellipse cx="63" cy="137" rx="7" ry="4.5" fill="#1a1a1a"/>
  <!-- Bear back paw -->
  <ellipse cx="78" cy="136" rx="8" ry="4" fill="#1a1a1a"/>

  <!-- ===== BULL (right, charging with head thrust forward) ===== -->
  <!-- Bull body - powerful barrel chest -->
  <ellipse cx="132" cy="112" rx="30" ry="21" fill="#1a1a1a" transform="rotate(-10 132 112)"/>
  <!-- Bull shoulders / hump -->
  <ellipse cx="112" cy="100" rx="17" ry="13" fill="#1a1a1a" transform="rotate(-15 112 100)"/>
  <!-- Bull neck -->
  <ellipse cx="100" cy="106" rx="12" ry="10" fill="#1a1a1a" transform="rotate(-25 100 106)"/>
  <!-- Bull head - thrusting forward and down -->
  <ellipse cx="88" cy="112" rx="14" ry="11" fill="#1a1a1a" transform="rotate(-35 88 112)"/>
  <!-- Bull muzzle -->
  <ellipse cx="76" cy="119" rx="8" ry="6" fill="#3d3d3d" transform="rotate(-30 76 119)"/>
  <!-- Nostrils -->
  <circle cx="72" cy="118" r="1.8" fill="#111"/>
  <circle cx="78" cy="122" r="1.8" fill="#111"/>
  <!-- Bull eye -->
  <circle cx="85" cy="106" r="2.8" fill="white"/>
  <circle cx="84.5" cy="106" r="1.3" fill="#1a1a1a"/>

  <!-- Bull HORNS - wide, thick, sweeping outward -->
  <path d="M83 100 Q72 82 56 80" stroke="#1a1a1a" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M93 97 Q90 76 82 68" stroke="#1a1a1a" stroke-width="8" fill="none" stroke-linecap="round"/>

  <!-- Bull front legs (sturdy, stamps) -->
  <path d="M110 128 L107 148" stroke="#1a1a1a" stroke-width="11" stroke-linecap="round"/>
  <path d="M122 130 L120 150" stroke="#1a1a1a" stroke-width="11" stroke-linecap="round"/>
  <!-- Front hooves (wider split) -->
  <ellipse cx="107" cy="150" rx="7" ry="4" fill="#1a1a1a"/>
  <ellipse cx="120" cy="151" rx="7" ry="4" fill="#1a1a1a"/>

  <!-- Bull rear legs -->
  <path d="M151 121 L157 142" stroke="#1a1a1a" stroke-width="11" stroke-linecap="round"/>
  <path d="M160 115 L168 134" stroke="#1a1a1a" stroke-width="11" stroke-linecap="round"/>
  <!-- Rear hooves -->
  <ellipse cx="157" cy="144" rx="7" ry="4" fill="#1a1a1a"/>
  <ellipse cx="168" cy="136" rx="7" ry="4" fill="#1a1a1a"/>

  <!-- Bull tail -->
  <path d="M160 102 Q173 90 169 76" stroke="#1a1a1a" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  <!-- Tail tuft -->
  <ellipse cx="167" cy="74" rx="6" ry="5" fill="#1a1a1a"/>
</svg>
